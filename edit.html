    <main>
    <h1>Edit Listing</h1>

    <!-- Step 1: Search for a listing by ID or title -->
    <section id="search-section">
        <label for="listing-id">Enter Listing ID to Edit:</label>
        <input type="text" id="listing-id" placeholder="e.g. 3" />
        <button onclick="fetchListing()">Find Listing</button>
    </section>

    <!-- Step 2: Form pre-populated with existing data -->
    <section id="edit-form-section" style="display:none;">
        <h2>Update Details</h2>

        <label for="title">Title:</label>
        <input type="text" id="title" placeholder="Listing title" />

        <label for="description">Description:</label>
        <textarea id="description" placeholder="Describe the item"></textarea>

        <label for="price">Price (€):</label>
        <input type="number" id="price" placeholder="e.g. 50" />

        <label for="category">Category:</label>
        <select id="category">
        <!-- Options loaded from Supabase dynamically -->
        </select>

        <label for="image-url">Image URL:</label>
        <input type="text" id="image-url" placeholder="https://..." />

        <button onclick="updateListing()">Save Changes</button>
        <p id="status-message"></p>
    </section>
    </main>
